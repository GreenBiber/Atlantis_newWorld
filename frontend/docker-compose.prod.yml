version: '3.8'

services:
  sd_db:
    image: postgres:15
    container_name: sd_db
    restart: always
    environment:
      POSTGRES_DB: schleier_prod
      POSTGRES_USER: schleier
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sd_pgdata:/var/lib/postgresql/data
    networks:
      - sd_network

  sd_backend:
    build: ./backend
    container_name: sd_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://schleier:${DB_PASSWORD}@sd_db:5432/schleier_prod
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      - sd_db
    networks:
      - sd_network

  sd_frontend:
    build: ./frontend
    container_name: sd_frontend
    restart: always
    depends_on:
      - sd_backend
    networks:
      - sd_network

  sd_nginx:
    image: nginx:alpine
    container_name: sd_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sd_backend
      - sd_frontend
    networks:
      - sd_network

volumes:
  sd_pgdata:

networks:
  sd_network:
    driver: bridge