version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: schleier_dev
      POSTGRES_USER: schleier
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://schleier:devpassword@db:5432/schleier_dev
      JWT_SECRET: dev_secret_change_in_prod
      NODE_ENV: development
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata: